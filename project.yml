name: SystemLoad
options:
  bundleIdPrefix: com.vkuznetsov
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  SystemLoad:
    type: application
    platform: macOS
    sources:
      - path: SystemLoad
    settings:
      base:
        PRODUCT_NAME: SystemLoad
        PRODUCT_BUNDLE_IDENTIFIER: com.vkuznetsov.systemload
        # Info.plist is generated from these keys (no separate plist file to maintain).
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "System Load"
        INFOPLIST_KEY_LSUIElement: YES          # menu-bar agent: no Dock icon, no main window
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        # Ad-hoc "Sign to Run Locally" — builds and runs without a developer team.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
