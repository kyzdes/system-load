name: SystemLoad
options:
  bundleIdPrefix: com.vkuznetsov
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.5.0"

settings:
  base:
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"

targets:
  SystemLoad:
    type: application
    platform: macOS
    sources:
      - path: SystemLoad
    dependencies:
      - package: Sparkle
    # Info.plist is generated by XcodeGen from these properties (custom Sparkle
    # keys can't be expressed via INFOPLIST_KEY_* build settings).
    info:
      path: SystemLoad/Info.plist
      properties:
        CFBundleDisplayName: System Load
        # Tie the bundle version to the build settings (XcodeGen otherwise hardcodes 1.0/1).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true                       # menu-bar agent: no Dock icon, no main window
        NSHighResolutionCapable: true
        LSMinimumSystemVersion: "13.0"
        # Sparkle auto-update feed (served from this repo) + EdDSA public key.
        SUFeedURL: https://raw.githubusercontent.com/kyzdes/system-load/main/appcast.xml
        SUPublicEDKey: fB1kBvFltno2kz+8boqKcsztnaapWUGmiEM9u15Nqz8=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_NAME: SystemLoad
        PRODUCT_BUNDLE_IDENTIFIER: com.vkuznetsov.systemload
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Ad-hoc "Sign to Run Locally" for dev/CI. Release builds override the
        # identity + enable hardened runtime via scripts/release.sh.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
